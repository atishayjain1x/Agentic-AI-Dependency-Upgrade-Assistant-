spring:
  application:
    name: dependency-upgrade-agent
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dependency_agent}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8080}

app:
  storage:
    root: ${APP_STORAGE_ROOT:uploads}
